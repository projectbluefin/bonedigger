repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 2c9f875913ee60ca25ce70243dc24d5b6415598c # v4.6.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
  - repo: https://github.com/rhysd/actionlint
    rev: 03d0035246f3e81f36aed592ffb4bebf33a03106 # v1.7.7
    hooks:
      - id: actionlint
  - repo: local
    hooks:
      - id: no-floating-action-tags
        name: Block floating GitHub Action tags (@main, @v*)
        language: pygrep
        entry: 'uses:(?!.*projectbluefin\/(?:actions|bonedigger)(?:\/[^@]*)?@).*@(main|master|latest|v[0-9]+)\b'
        types: [yaml]
        files: '\.github/workflows/'
      - id: no-sha-pins-for-internal-actions
        name: Block SHA pins for projectbluefin/actions refs
        language: pygrep
        entry: 'uses:\s*projectbluefin/actions(?:/[A-Za-z0-9._-]+)?@[0-9a-f]{40}\b'
        types: [yaml]
        files: '\.github/workflows/'
