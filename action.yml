name: 'bonedigger'
description: 'ujust report intake, confirm-driven priority escalation, and agent donation fast-track for Project Bluefin'
author: 'Project Bluefin'

inputs:
  brand_name:
    description: 'Retained for backward compatibility; ignored by the slim workflow'
    required: false
    default: 'Bluefin'
  brand_emoji:
    description: 'Retained for backward compatibility; ignored by the slim workflow'
    required: false
    default: '🦖'
  pipeline_marker:
    description: 'Retained for backward compatibility; ignored by the slim workflow'
    required: false
    default: '<!-- bonedigger-pipeline -->'

runs:
  using: 'composite'
  steps:
    - name: 'bonedigger is a reusable workflow, not a composite action'
      shell: bash
      run: |
        echo "Use bonedigger via: uses: projectbluefin/bonedigger/.github/workflows/lifecycle.yml@main"
        echo "bonedigger now scopes to ujust report intake, confirm-based priority escalation, and agent donation fast-track."
        echo "See README.md for usage."
