name: sync issue templates

on:
  push:
    branches: [main]
    paths:
      - 'templates/**'

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-24.04
    concurrency:
      group: sync-templates-${{ matrix.repo }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        repo:
          - projectbluefin/bluefin
          - projectbluefin/bluefin-lts
          - projectbluefin/common
          - projectbluefin/dakota
          - projectbluefin/knuckle
    steps:
      - name: Generate mergeraptor app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.MERGERAPTOR_APP_ID }}
          private-key: ${{ secrets.MERGERAPTOR_PRIVATE_KEY }}
          repositories: bluefin,bluefin-lts,common,dakota,knuckle

      - name: Checkout bonedigger
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: bonedigger

      - name: Checkout ${{ matrix.repo }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: downstream

      - name: Copy templates
        run: |
          mkdir -p downstream/.github/ISSUE_TEMPLATE
          cp bonedigger/templates/*.yml downstream/.github/ISSUE_TEMPLATE/

      - name: Open PR if changed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ matrix.repo }}
          SHA: ${{ github.sha }}
        run: |
          cd downstream
          if git diff --quiet; then
            echo "No template changes for $REPO — skipping."
            exit 0
          fi
          BRANCH="bonedigger/sync-templates-${SHA::8}"
          git config user.name "bonedigger"
          git config user.email "bonedigger@projectbluefin.github.io"
          git checkout -b "$BRANCH"
          git add .github/ISSUE_TEMPLATE/
          git commit \
            -m "chore(templates): sync issue templates from projectbluefin/bonedigger@${SHA::8}" \
            -m "Automated sync — templates are maintained in projectbluefin/bonedigger." \
            -m "Do not edit these files directly in this repo."
          git push origin "$BRANCH"
          PR_BODY_WITH_LABEL=$(cat <<EOF
          Automated template sync from [projectbluefin/bonedigger](https://github.com/projectbluefin/bonedigger) @ '${SHA::8}'.

          Templates are maintained in bonedigger — edit them there, not here.

          ---
          - [ ] Review template changes before merging
          EOF
          )
          PR_BODY=$(cat <<EOF
          Automated template sync from [projectbluefin/bonedigger](https://github.com/projectbluefin/bonedigger) @ '${SHA::8}'.

          Templates are maintained in bonedigger — edit them there, not here.
          EOF
          )
          gh pr create \
            --repo "$REPO" \
            --title "chore(templates): sync issue templates from bonedigger" \
            --body "$PR_BODY_WITH_LABEL" \
            --head "$BRANCH" \
            --base main \
            --label "kind/automation" 2>/dev/null || \
          gh pr create \
            --repo "$REPO" \
            --title "chore(templates): sync issue templates from bonedigger" \
            --body "$PR_BODY" \
            --head "$BRANCH" \
            --base main
