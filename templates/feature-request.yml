name: "Feature request"
description: "Propose an improvement with a clear problem and solution."
labels: ["type/feature", "status/discussing"]
type: "Feature"
body:
  - type: markdown
    attributes:
      value: |
        Clear feature requests are easier to evaluate and easier to build.
        Focus on the problem, the proposed solution, and any alternatives you considered.

  - type: textarea
    id: problem-statement
    attributes:
      label: "Problem statement"
      description: "What is missing, painful, or confusing today?"
      placeholder: |
        I have to repeat the same manual setup on every fresh install,
        and there is no documented one-step workflow for it.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: "Proposed solution"
      description: "Describe the change you want to see."
      placeholder: |
        Add a supported command or workflow that completes the setup in one step,
        and document it in the repository.
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: "Alternatives considered"
      description: "What other approaches did you consider, and why are they not as good?"
      placeholder: |
        I considered keeping a shell script locally, but that is hard to maintain
        and does not help other users.
    validations:
      required: false

  - type: textarea
    id: extra-context
    attributes:
      label: "Extra context"
      description: "Optional. Related issues, mockups, upstream references, or constraints."
      placeholder: "Related issue: #45. Upstream reference: https://example.com/design"
    validations:
      required: false
